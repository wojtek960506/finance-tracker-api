services:
  mongo-integration:
    image: mongo:8
    container_name: finance-tracker-mongo-integration
    network_mode: host
    command: ['mongod', '--bind_ip_all', '--port', '27018', '--replSet', 'rs0']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --port 27018 --quiet --eval "try { if (rs.status().ok === 1) { quit(0); } quit(1); } catch (error) { rs.initiate({_id: ''rs0'', members: [{ _id: 0, host: ''127.0.0.1:27018'' }]}); quit(1); }"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
