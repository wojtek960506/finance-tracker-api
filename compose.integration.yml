services:
  mongo-integration:
    image: mongo:8
    container_name: finance-tracker-mongo-integration
    ports:
      - '27018:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
